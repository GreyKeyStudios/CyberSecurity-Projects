# Keeps the Supabase free-tier project awake (pauses after ~7 days of no API activity).
# Add repo secrets: SUPABASE_URL, SUPABASE_ANON_KEY (same values as Cloudflare env vars).
# Manual run: Actions tab → "Supabase keep-alive" → Run workflow
name: Supabase keep-alive

on:
  schedule:
    - cron: "0 14 * * *" # daily 14:00 UTC (~9am ET)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth + REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing GitHub secrets: SUPABASE_URL and/or SUPABASE_ANON_KEY"
            echo "Add them under Settings → Secrets and variables → Actions"
            exit 1
          fi
          curl -sf "${SUPABASE_URL}/auth/v1/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}"
          echo "Supabase keep-alive OK at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
